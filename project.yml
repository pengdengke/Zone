name: Zone
options:
  bundleIdPrefix: com.pengdengke
configs:
  Debug: debug
  Release: release
packages:
  ZoneCore:
    path: .
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "6.0"
targets:
  Zone:
    type: application
    platform: macOS
    sources:
      - App/Sources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Zone
        LSUIElement: true
        NSBluetoothAlwaysUsageDescription: Zone reads Bluetooth signal strength from your selected device to decide when to lock or wake your Mac.
    settings:
      base:
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: ZoneCore
        product: ZoneCore
  ZoneTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - App/Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.pengdengke.ZoneTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Zone.app/Contents/MacOS/Zone"
    dependencies:
      - target: Zone
      - package: ZoneCore
        product: ZoneCore
schemes:
  Zone:
    build:
      targets:
        Zone: all
        ZoneTests: [test]
    test:
      targets:
        - ZoneTests
